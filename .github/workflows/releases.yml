name: Build Portable Release Zips

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:

# =========================================================
# WINDOWS (x64)
# =========================================================
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # Download latest rclone
      - name: Download rclone (Windows)
        shell: powershell
        run: |
          curl -LO https://downloads.rclone.org/rclone-current-windows-amd64.zip
          tar -xf rclone-current-windows-amd64.zip
          $dir = Get-ChildItem -Directory rclone-* | Select-Object -First 1
          Copy-Item "$dir\rclone.exe" rclone.exe

      - name: Build executable
        run: |
          pyinstaller --noconfirm --windowed --onefile ^
            --add-data "icon.png;." ^
            rclone_GUI.py

      - name: Prepare release folder
        run: |
          mkdir release
          copy dist\rclone_GUI.exe release\
          copy rclone.exe release\

      - name: Zip release
        run: powershell Compress-Archive -Path release\* -DestinationPath app-windows-${{ github.ref_name }}.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-windows-${{ github.ref_name }}.zip


# =========================================================
# LINUX (x64)
# =========================================================
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pyqt6 unzip

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # Download latest rclone
      - name: Download rclone (Linux)
        run: |
          curl -LO https://downloads.rclone.org/rclone-current-linux-amd64.zip
          unzip rclone-current-linux-amd64.zip
          cp rclone-*/rclone ./rclone
          chmod +x rclone

      - name: Build binary
        run: |
          pyinstaller --noconfirm --windowed --onefile \
            --add-data "icon.png:." \
            rclone_GUI.py

      - name: Prepare release folder
        run: |
          mkdir release
          cp dist/rclone_GUI release/
          cp rclone release/

      - name: Zip release
        run: zip -r app-linux-${{ github.ref_name }}.zip release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-linux-${{ github.ref_name }}.zip


