name: Build Portable Release Zips

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:

# =========================================================
# WINDOWS (x64)
# =========================================================
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # Download latest rclone
      - name: Download rclone (Windows)
        shell: pwsh
        run: |
          $url = "https://downloads.rclone.org/rclone-current-windows-amd64.zip"
          $zip = "rclone.zip"
      
          Invoke-WebRequest -Uri $url -OutFile $zip
      
          Expand-Archive $zip -DestinationPath "rclone" -Force
      
          $exe = Get-ChildItem -Path "rclone" -Recurse -Filter "rclone.exe" | Select-Object -First 1
      
          Copy-Item $exe.FullName "rclone.exe"

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --add-data "icon.png;." `
            rclone_GUI.py

      - name: Prepare release folder
        run: |
          mkdir release 
          copy dist\rclone_GUI.exe release\
          copy rclone.exe release\
          copy icon.ico release\
          copy icon.png release\

      - name: Zip release
        run: powershell Compress-Archive -Path release\* -DestinationPath rclone_GUI-windows-${{ github.ref_name }}.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rclone_GUI-windows-${{ github.ref_name }}.zip

# =========================================================
# MACOS (Intel x64)
# =========================================================
  build-macos-intel:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # Download latest rclone (Intel)
      - name: Download rclone (macOS Intel)
        run: |
          curl -LO https://downloads.rclone.org/rclone-current-osx-amd64.zip
          unzip rclone-current-osx-amd64.zip
          cp rclone-*/rclone ./rclone
          chmod +x rclone

      - name: Build rclone_GUI
        run: |
          pyinstaller --noconfirm --windowed --onefile \
            --add-data "icon.png:." \
            rclone_GUI.py

      - name: Prepare release folder
        run: |
          mkdir release
          cp dist/rclone_GUI release/
          cp rclone release/
          cp icon.png release/

      - name: Zip release
        run: zip -r rclone_GUI-macos-intel-${{ github.ref_name }}.zip release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rclone_GUI-macos-intel-${{ github.ref_name }}.zip


# =========================================================
# MACOS (rclone_GUIle Silicon ARM64)
# =========================================================
  build-macos-arm64:
    runs-on: macos-latest   # ARM64 runner

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # Download latest rclone (ARM64)
      - name: Download rclone (macOS ARM64)
        run: |
          curl -LO https://downloads.rclone.org/rclone-current-osx-arm64.zip
          unzip rclone-current-osx-arm64.zip
          cp rclone-*/rclone ./rclone
          chmod +x rclone

      - name: Build rclone_GUI (ARM64 native)
        run: |
          pyinstaller --noconfirm --windowed --onefile \
            --add-data "icon.png:." \
            rclone_GUI.py

      - name: Prepare release folder
        run: |
          mkdir release
          cp dist/rclone_GUI release/
          cp rclone release/
          cp icon.png release/

      - name: Zip release
        run: zip -r rclone_GUI-macos-arm64-${{ github.ref_name }}.zip release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rclone_GUI-macos-arm64-${{ github.ref_name }}.zip
